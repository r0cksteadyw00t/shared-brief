const b2a=b=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));
async function derive(pw,salt,iter){
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function unlock(pw,persist){
  const err=document.getElementById('err'), go=document.getElementById('go');
  err.textContent=''; go.disabled=true; go.innerHTML='<span class="spin"></span>Unlocking';
  try{
    const key=await derive(pw, b2a(P.salt), P.iter);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(P.iv)}, key, b2a(P.ct));
    const html=new TextDecoder().decode(pt);
    if(persist) localStorage.setItem('pk_pw', pw); else sessionStorage.setItem('pk_pw', pw);
    document.open(); document.write(html); document.close();
  }catch(e){
    err.textContent='Wrong passphrase. Try again.';
    go.disabled=false; go.textContent='Unlock';
    localStorage.removeItem('pk_pw'); sessionStorage.removeItem('pk_pw');
  }
}
document.getElementById('f').addEventListener('submit',e=>{e.preventDefault();
  unlock(document.getElementById('pw').value, document.getElementById('rm').checked);});
const saved=localStorage.getItem('pk_pw')||sessionStorage.getItem('pk_pw');
if(saved) unlock(saved, !!localStorage.getItem('pk_pw'));
